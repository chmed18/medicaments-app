# ======================================================
# APPLICATION
# ======================================================

spring.application.name=medicaments-app
spring.config.import=optional:file:./application-local.properties
server.port=${APP_PORT:8080}

# ======================================================
# DATABASE
# ======================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres.railway.internal:5432/railway}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:LrtyGsTZZyouHSbQaYWPqwMEAkvJISsY}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================
# JPA / HIBERNATE
# ======================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======================================================
# THYMELEAF
# ======================================================

spring.thymeleaf.cache=false

# ======================================================
# LOGGING
# ======================================================

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ======================================================
# DEVTOOLS
# ======================================================

spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=true

spring.security.user.name=${APP_USERNAME:anetat}
spring.security.user.password=${APP_PASSWORD:anetat2026}

# ======================================================
# SWAGGER / OPENAPI
# ======================================================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
