<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="table-wrapper" th:fragment="results-table">
    <table>
        <thead>
        <tr>
            <th>Libellé complet</th>
            <th>Prix pharmacie</th>
            <th>Consultation</th>
        </tr>
        </thead>
        <tbody>
        <tr class="empty-row" th:if="${#lists.isEmpty(results)}">
            <td colspan="3">Aucun résultat trouvé.</td>
        </tr>
        <tr th:each="medicament : ${results}">
            <td data-label="Libellé complet">
                <div class="result-title" th:text="${medicament.libelleComplet}">Doliprane 1000 mg comprimé</div>
                <div class="result-subtitle" th:text="${medicament.libelle}">Doliprane</div>
            </td>
            <td class="price-cell" data-label="Prix pharmacie" th:text="${medicament.prixPharmacie != null ? medicament.prixPharmacie + ' MRU' : 'Non renseigné'}"></td>
            <td data-label="Consultation">
                <a class="detail-link" th:href="@{/medicaments/{id}(id=${medicament.id})}">Consulter la fiche</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
