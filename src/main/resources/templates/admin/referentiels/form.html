<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Modifier ' + ${type.singularLabel} : 'Créer ' + ${type.singularLabel}">Édition référentiel</title>
    <link rel="stylesheet" th:href="@{/css/admin-referentiels.css}" href="/css/admin-referentiels.css">
</head>
<body>
<main class="admin-page admin-page-narrow">
    <header class="admin-header">
        <div>
            <p class="admin-eyebrow">Administration</p>
            <h1 th:text="${isEdit} ? 'Modifier ' + ${type.singularLabel} : 'Créer ' + ${type.singularLabel}">Formulaire</h1>
            <p class="admin-subtitle">Gestion du référentiel des médicaments</p>
        </div>
        <a class="back-link" th:href="@{/admin/referentiels/{type}(type=${type.slug})}">← Retour à la liste</a>
    </header>

    <nav class="admin-nav">
        <a th:href="@{/admin/medicaments}">Médicaments</a>
        <a th:classappend="${type.slug == 'laboratoires'} ? ' active'" th:href="@{/admin/referentiels/laboratoires}">Laboratoires</a>
        <a th:classappend="${type.slug == 'molecules'} ? ' active'" th:href="@{/admin/referentiels/molecules}">Molécules</a>
        <a th:classappend="${type.slug == 'formes'} ? ' active'" th:href="@{/admin/referentiels/formes}">Formes</a>
        <a th:classappend="${type.slug == 'unites-dosage'} ? ' active'" th:href="@{/admin/referentiels/unites-dosage}">Unités de dosage</a>
    </nav>


    <section class="card">
        <h2 th:text="${isEdit} ? 'Modifier ' + ${type.singularLabel} : 'Créer ' + ${type.singularLabel}">Formulaire</h2>

        <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}"></div>

        <form method="post"
              th:if="${isEdit}"
              th:object="${form}"
              th:action="@{/admin/referentiels/{type}/{id}(type=${type.slug},id=${entityId})}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="field">
                <span th:text="${type.primaryFieldLabel}">Libellé</span>
                <input type="text" th:field="*{primaryValue}" required
                       th:placeholder="${type.slug == 'molecules' ? 'ex: Paracétamol, Amoxicilline' : (type.slug == 'formes' ? 'ex: cp' : (type.slug == 'unites-dosage' ? 'ex: mg, ml, UI' : 'ex: Laboratoire PHARMA'))}">
                <small class="field-error" th:if="${#fields.hasErrors('primaryValue')}" th:errors="*{primaryValue}"></small>
            </label>

            <label class="field" th:if="${type.hasSecondaryField()}">
                <span th:text="${type.secondaryFieldLabel}">Complément</span>
                <textarea rows="4" th:field="*{secondaryValue}"
                          th:placeholder="${type.slug == 'formes' ? 'ex: comprimé' : (type.slug == 'unites-dosage' ? 'ex: milligramme' : 'ex: Adresse complète')}"></textarea>
                <small class="field-error" th:if="${#fields.hasErrors('secondaryValue')}" th:errors="*{secondaryValue}"></small>
            </label>

            <div class="form-actions">
                <a class="btn btn-light" th:href="@{/admin/referentiels/{type}(type=${type.slug})}">Annuler</a>
                <button class="btn btn-primary" type="submit">Mettre à jour</button>
            </div>
        </form>

        <form method="post"
              th:unless="${isEdit}"
              th:object="${form}"
              th:action="@{/admin/referentiels/{type}(type=${type.slug})}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="field">
                <span th:text="${type.primaryFieldLabel}">Libellé</span>
                <input type="text" th:field="*{primaryValue}" required
                       th:placeholder="${type.slug == 'molecules' ? 'ex: Paracétamol, Amoxicilline' : (type.slug == 'formes' ? 'ex: cp' : (type.slug == 'unites-dosage' ? 'ex: mg, ml, UI' : 'ex: Laboratoire PHARMA'))}">
                <small class="field-error" th:if="${#fields.hasErrors('primaryValue')}" th:errors="*{primaryValue}"></small>
            </label>

            <label class="field" th:if="${type.hasSecondaryField()}">
                <span th:text="${type.secondaryFieldLabel}">Complément</span>
                <textarea rows="4" th:field="*{secondaryValue}"
                          th:placeholder="${type.slug == 'formes' ? 'ex: comprimé' : (type.slug == 'unites-dosage' ? 'ex: milligramme' : 'ex: Adresse complète')}"></textarea>
                <small class="field-error" th:if="${#fields.hasErrors('secondaryValue')}" th:errors="*{secondaryValue}"></small>
            </label>

            <div class="form-actions">
                <a class="btn btn-light" th:href="@{/admin/referentiels/{type}(type=${type.slug})}">Annuler</a>
                <button class="btn btn-primary" type="submit">Créer</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
