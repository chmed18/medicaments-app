<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Admin référentiel - ' + ${type.pluralLabel}">Admin référentiel</title>
    <link rel="stylesheet" th:href="@{/css/admin-referentiels.css}" href="/css/admin-referentiels.css">
    <script defer th:src="@{/js/admin-referentiels.js}" src="/js/admin-referentiels.js"></script>
</head>
<body>
<main class="admin-page">
    <header class="admin-header">
        <div>
            <p class="admin-eyebrow">Administration</p>
            <h1 th:text="${type.pluralLabel}">Formes</h1>
            <p class="admin-subtitle">Gestion du référentiel des médicaments</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/referentiels/{type}/new(type=${type.slug})}">+ Nouvelle entrée</a>
    </header>

    <nav class="admin-nav">
        <a th:href="@{/admin/medicaments}">Médicaments</a>
        <a th:classappend="${type.slug == 'laboratoires'} ? ' active'" th:href="@{/admin/referentiels/laboratoires}">Laboratoires</a>
        <a th:classappend="${type.slug == 'molecules'} ? ' active'" th:href="@{/admin/referentiels/molecules}">Molécules</a>
        <a th:classappend="${type.slug == 'formes'} ? ' active'" th:href="@{/admin/referentiels/formes}">Formes</a>
        <a th:classappend="${type.slug == 'unites-dosage'} ? ' active'" th:href="@{/admin/referentiels/unites-dosage}">Unités de dosage</a>
    </nav>

    <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="card">
        <form class="search-row" method="get" th:action="@{/admin/referentiels/{type}(type=${type.slug})}">
            <input type="text"
                   name="q"
                   th:value="${query}"
                   placeholder="Rechercher..."
                   aria-label="Recherche">
            <button class="btn" type="submit">Rechercher</button>
            <a class="btn btn-light" th:href="@{/admin/referentiels/{type}(type=${type.slug})}">Réinitialiser</a>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th th:text="${type.primaryFieldLabel}">Libellé</th>
                    <th th:if="${type.hasSecondaryField()}" th:text="${type.secondaryFieldLabel}">Complément</th>
                    <th class="actions-col">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(items)}">
                    <td th:colspan="${type.hasSecondaryField()} ? 3 : 2" class="empty-cell">
                        Aucun résultat pour cette recherche.
                    </td>
                </tr>
                <tr th:each="item : ${items}">
                    <td th:text="${item.primaryValue}">Valeur principale</td>
                    <td th:if="${type.hasSecondaryField()}" th:text="${item.secondaryValue}">Valeur secondaire</td>
                    <td class="actions-cell">
                        <a class="btn btn-light" th:href="@{/admin/referentiels/{type}/{id}/edit(type=${type.slug},id=${item.id})}">Modifier</a>
                        <form method="post"
                              th:action="@{/admin/referentiels/{type}/{id}/delete(type=${type.slug},id=${item.id})}"
                              data-confirm-delete
                              th:attr="data-item-label=${item.primaryValue}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-danger" type="submit">Supprimer</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${page.totalPages > 1}">
            <a th:classappend="${page.first} ? ' disabled'"
               th:href="@{/admin/referentiels/{type}(type=${type.slug},q=${query},page=${page.number - 1},size=${page.size})}">Précédent</a>
            <span th:text="'Page ' + (${page.number} + 1) + ' / ' + ${page.totalPages}">Page 1 / 1</span>
            <a th:classappend="${page.last} ? ' disabled'"
               th:href="@{/admin/referentiels/{type}(type=${type.slug},q=${query},page=${page.number + 1},size=${page.size})}">Suivant</a>
        </div>
    </section>
</main>
</body>
</html>
