<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Administration</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css">
</head>
<body>

<div class="login-wrapper">

    <!-- Bandeau hero -->
    <div class="login-hero">
        <img th:src="@{/images/logo-1.png}" src="/images/logo-1.png" alt="Logo du pays">
        <div class="login-hero-copy">
            <p class="service-tag">Service public</p>
            <h1>Médicaments — Espace administration</h1>
        </div>
        <img th:src="@{/images/logo-2.png}" src="/images/logo-2.png" alt="Logo du ministère">
    </div>

    <!-- Carte de connexion -->
    <div class="login-card">
        <h2>Connexion</h2>

        <!-- Message d'erreur -->
        <div class="alert alert-error" th:if="${param.error}">
            Identifiants incorrects. Veuillez réessayer.
        </div>

        <!-- Message de déconnexion -->
        <div class="alert alert-success" th:if="${param.logout}">
            Vous avez été déconnecté avec succès.
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username"
                       placeholder="Votre identifiant"
                       autocomplete="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password"
                       placeholder="Votre mot de passe"
                       autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-login">Se connecter</button>
        </form>
    </div>

</div>

</body>
</html>
