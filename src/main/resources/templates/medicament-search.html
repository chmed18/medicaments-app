<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultation des prix des medicaments</title>
    <style>
        :root {
            --pharma-blue: #0f4c81;
            --pharma-blue-soft: #e8f3fb;
            --pharma-green: #1f9d7a;
            --ink: #1b2633;
            --muted: #617187;
            --surface: #ffffff;
            --line: #d7e2eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #f2f8fc 0%, #fbfdff 45%, #ffffff 100%);
        }

        .page {
            max-width: 980px;
            margin: 2rem auto;
            padding: 0 1rem 2rem;
        }

        .hero {
            background: linear-gradient(135deg, #0f4c81 0%, #1a6fa6 60%, #2390b8 100%);
            color: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 28px rgba(15, 76, 129, 0.22);
            margin-bottom: 1rem;
        }

        .hero h1 {
            margin: 0 0 0.35rem;
            font-size: 1.45rem;
        }

        .hero p {
            margin: 0;
            color: #e6f3ff;
        }

        .search-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 6px 18px rgba(17, 44, 73, 0.08);
        }

        form {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }

        label {
            font-weight: 600;
            color: var(--ink);
            margin-right: 0.25rem;
        }

        input[type="text"] {
            flex: 1 1 420px;
            min-width: 220px;
            padding: 0.72rem 0.8rem;
            border: 1px solid #bdd2e2;
            border-radius: 10px;
            background-color: #fcfeff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus-visible {
            outline: none;
            border-color: #4f94d6;
            box-shadow: 0 0 0 3px rgba(79, 148, 214, 0.22);
        }

        button {
            padding: 0.72rem 1.15rem;
            border: 0;
            border-radius: 10px;
            background: linear-gradient(135deg, #1f9d7a 0%, #22b886 100%);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s ease;
        }

        button:hover { filter: brightness(1.04); }
        button:active { transform: translateY(1px); }

        .result-meta {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .results-chip {
            display: inline-block;
            padding: 0.3rem 0.65rem;
            border-radius: 999px;
            background: var(--pharma-blue-soft);
            color: var(--pharma-blue);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(17, 44, 73, 0.06);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 560px;
        }

        thead th {
            text-align: left;
            background: #eef6fc;
            color: #17476d;
            padding: 0.8rem;
            font-size: 0.95rem;
            border-bottom: 1px solid #d4e4f1;
        }

        tbody td {
            border-top: 1px solid #e7eef4;
            padding: 0.78rem;
            vertical-align: top;
        }

        tbody tr:nth-child(even) { background-color: #fbfdff; }

        .price-cell {
            white-space: nowrap;
            font-weight: 700;
            color: #155c95;
        }

        .empty-row td {
            color: var(--muted);
            font-style: italic;
        }

        @media (max-width: 640px) {
            .page { margin: 1rem auto; }

            .hero { padding: 1.1rem; }

            .hero h1 { font-size: 1.2rem; }

            .search-card { padding: 0.8rem; }

            table {
                min-width: 100%;
                border: 0;
            }

            thead {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                border: 0;
            }

            tbody tr {
                display: block;
                border-bottom: 1px solid #e7eef4;
                padding: 0.15rem 0;
            }

            tbody td {
                display: grid;
                grid-template-columns: 125px 1fr;
                gap: 0.5rem;
                border: 0;
                padding: 0.65rem 0.8rem;
            }

            tbody td::before {
                content: attr(data-label);
                font-weight: 700;
                color: #355675;
            }
        }

        /* ── Autocomplete ── */
        .autocomplete-wrapper {
            position: relative;
            flex: 1 1 420px;
            min-width: 220px;
        }

        .autocomplete-wrapper input[type="text"] {
            width: 100%;
        }

        #autocomplete-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #bdd2e2;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(17, 44, 73, 0.12);
            z-index: 100;
            max-height: 280px;
            overflow-y: auto;
            display: none;
        }

        #autocomplete-list li {
            list-style: none;
            padding: 0.65rem 0.85rem;
            cursor: pointer;
            font-size: 0.93rem;
            border-bottom: 1px solid #eef3f8;
            color: var(--ink);
            transition: background 0.1s;
        }

        #autocomplete-list li:last-child { border-bottom: 0; }

        #autocomplete-list li:hover,
        #autocomplete-list li.active {
            background: var(--pharma-blue-soft);
            color: var(--pharma-blue);
        }

        #autocomplete-list li mark {
            background: transparent;
            color: var(--pharma-blue);
            font-weight: 700;
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <h1>Consultation des prix des m&eacute;dicaments</h1>
        <p>Trouvez rapidement le prix pharmacie a partir du nom ou du libelle complet.</p>
    </section>

    <section class="search-card">
        <form method="get" th:action="@{/}">
            <label for="query">Rechercher un medicament :</label>
            <div class="autocomplete-wrapper">
                <input id="query" name="query" type="text" th:value="${query}" placeholder="Ex: Doliprane 1000 mg comprime" autocomplete="off" />
                <ul id="autocomplete-list" role="listbox" aria-label="Suggestions"></ul>
            </div>
            <button type="submit">Rechercher</button>
        </form>
        <div class="result-meta">
            <span class="results-chip" th:text="${results != null ? #lists.size(results) : 0} + ' resultat(s)'">0 resultat(s)</span>
        </div>
    </section>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Libelle complet</th>
                <th>Prix pharmacie</th>
            </tr>
            </thead>
            <tbody>
            <tr class="empty-row" th:if="${#lists.isEmpty(results)}">
                <td colspan="2">Aucun resultat trouve.</td>
            </tr>
            <tr th:each="medicament : ${results}">
                <td data-label="Libelle complet" th:text="${medicament.libelleComplet}"></td>
                <td class="price-cell" data-label="Prix pharmacie" th:text="${medicament.prixPharmacie}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    (function () {
        const input = document.getElementById('query');
        const list  = document.getElementById('autocomplete-list');
        let activeIndex = -1;
        let debounceTimer = null;
        let currentQuery  = '';

        function highlight(text, query) {
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
        }

        function renderList(suggestions, query) {
            list.innerHTML = '';
            activeIndex = -1;
            if (!suggestions.length) { list.style.display = 'none'; return; }
            suggestions.forEach(function (item) {
                const li = document.createElement('li');
                li.setAttribute('role', 'option');
                li.innerHTML = highlight(item, query);
                li.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    input.value = item;
                    list.style.display = 'none';
                    input.form.submit();
                });
                list.appendChild(li);
            });
            list.style.display = 'block';
        }

        function fetchSuggestions(query) {
            if (!query || query.length < 2) { list.style.display = 'none'; return; }
            currentQuery = query;
            fetch('/api/medicaments/autocomplete?query=' + encodeURIComponent(query), {
                credentials: 'same-origin',
                headers: { 'Accept': 'application/json' }
            })
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (data) {
                if (currentQuery === query) renderList(data, query);
            })
            .catch(function () { list.style.display = 'none'; });
        }

        input.addEventListener('input', function () {
            clearTimeout(debounceTimer);
            const q = input.value.trim();
            debounceTimer = setTimeout(function () { fetchSuggestions(q); }, 250);
        });

        input.addEventListener('keydown', function (e) {
            const items = list.querySelectorAll('li');
            if (!items.length || list.style.display === 'none') return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIndex = (activeIndex + 1) % items.length;
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIndex = (activeIndex - 1 + items.length) % items.length;
            } else if (e.key === 'Enter') {
                if (activeIndex >= 0 && items[activeIndex]) {
                    e.preventDefault();
                    input.value = items[activeIndex].textContent;
                    list.style.display = 'none';
                    input.form.submit();
                }
                return;
            } else if (e.key === 'Escape') {
                list.style.display = 'none';
                activeIndex = -1;
                return;
            } else { return; }
            items.forEach(function (el, i) {
                el.classList.toggle('active', i === activeIndex);
            });
        });

        document.addEventListener('click', function (e) {
            if (!input.contains(e.target) && !list.contains(e.target)) {
                list.style.display = 'none';
            }
        });
    })();
</script>
</body>
</html>
